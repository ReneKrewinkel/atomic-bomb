name: "Publish and Maintain"

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    name: "Publish to npm"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Check npm version
        id: npm-version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "atomic-bomb@$PACKAGE_VERSION" version > /dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "atomic-bomb@$PACKAGE_VERSION is already published"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "atomic-bomb@$PACKAGE_VERSION is not published yet"
          fi

      - name: Check npm auth token
        if: steps.npm-version.outputs.published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error title=Missing NPM_TOKEN::Add an npm automation token as the NPM_TOKEN repository secret."
            exit 1
          fi

      - name: Publish
        if: steps.npm-version.outputs.published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance
